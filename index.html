<body>
  <video id="remoteVideo" autoplay></video>
  <button onclick="enableMute1()" class="button button1" >Mute sound</button><br>
  <button onclick="disableMute1()" class="button button2">Enable sound</button><br>
  <button onclick="checkMute1()" class="button button3">Check muted status</button><br>
  <button onclick="playPause1()" class="button button4">PAUSE/PLAY</button><br><br>
  <video id="localVideo" autoplay muted></video>
  <a href="javascript:close_window();" class="close-icon"></a>
<script>
var vid = document.getElementById("remoteVideo");
var vid1 = document.getElementById("remoteVideo");
function enableMute1() { 
  vid.muted = true;
} 

function disableMute1() { 
  vid.muted = false;
} 
function playPause1() { 
  if (vid1.paused) 
    vid1.play(); 
  else 
    vid1.pause(); 
} 
function checkMute1() { 
  if(vid.muted===true)
  {
    alert("SOUND IS MUTED");
  }
  else
    alert("SOUND IS ON");
}
function close_window()
{
  if(confirm("DO YOU WANT TO QUIT THE CHAT?"))
  {
  location.replace("https://www.google.com/");
  }
};
</script>
